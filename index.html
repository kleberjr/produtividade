<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtividade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: #f0f4f8;
    font-family: sans-serif;
    user-select: none;
  }
  canvas { display: block; }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .overlay.show { display: flex; }

  /* Setup modal */
  #setup-box {
    background: #fff;
    border-radius: 20px;
    padding: 44px 52px 48px;
    text-align: center;
    max-width: 400px;
    width: 90%;
    animation: pop 0.4s cubic-bezier(.36,1.56,.64,1) both;
  }
  #setup-box h2 {
    font-size: 17px;
    font-weight: 600;
    color: #1a1a1a;
    line-height: 1.5;
    margin-bottom: 28px;
  }
  .counter-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .counter-row input[type=number] {
    width: 80px;
    height: 44px;
    border: 1.5px solid #c5cfe0;
    border-radius: 10px;
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    color: #185FA5;
    outline: none;
    -moz-appearance: textfield;
  }
  .counter-row input[type=number]::-webkit-outer-spin-button,
  .counter-row input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .counter-row input[type=number]:focus { border-color: #185FA5; }
  .btn-counter {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1.5px solid #c5cfe0;
    background: #fff;
    font-size: 22px;
    color: #185FA5;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .btn-counter:hover  { background: #e8f0fb; border-color: #185FA5; }
  .btn-counter:active { background: #d0e3f7; }
  .btn-start {
    padding: 13px 40px;
    border: none;
    border-radius: 30px;
    background: #185FA5;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-start:hover  { background: #0C447C; }
  .btn-start:active { background: #042C53; }

  /* Result modal */
  #result-box {
    background: #fff;
    border-radius: 20px;
    padding: 60px 80px;
    text-align: center;
    animation: pop 0.4s cubic-bezier(.36,1.56,.64,1) both;
  }
  #result-box h1 {
    font-size: 52px;
    font-weight: 700;
    color: #3B6D11;
    letter-spacing: 2px;
  }
  #result-box p { margin-top: 12px; font-size: 16px; color: #888; }
  #result-box button {
    margin-top: 28px;
    padding: 12px 36px;
    border: none;
    border-radius: 30px;
    background: #3B6D11;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
  }
  #result-box button:hover { background: #27500A; }

  @keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="overlay show" id="setup-overlay">
  <div id="setup-box">
    <h2>Insira a quantidade de bonecos que aparecerão no cenário:</h2>
    <div class="counter-row">
      <button class="btn-counter" id="btn-minus">−</button>
      <input type="number" id="qty-input" value="5" min="1" max="20">
      <button class="btn-counter" id="btn-plus">+</button>
    </div>
    <button class="btn-start" id="btn-start">Iniciar dinâmica</button>
  </div>
</div>

<div class="overlay" id="result-overlay">
  <div id="result-box">
    <h1>Produtividade</h1>
    <p>Todos reunidos no centro! 🎉</p>
    <button onclick="restart()" style="margin-top:28px;background:#185FA5;">Reiniciar</button>
  </div>
</div>

const STICK_IMGS = [IMG_1, IMG_2, IMG_3, IMG_4, IMG_5];

/* Replace drawFigure with image-based version */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

/* Setup modal */
const qtyInput = document.getElementById('qty-input');
const MIN = 1, MAX = 20;

document.getElementById('btn-minus').addEventListener('click', () => {
  qtyInput.value = Math.max(MIN, (parseInt(qtyInput.value) || MIN) - 1);
});
document.getElementById('btn-plus').addEventListener('click', () => {
  qtyInput.value = Math.min(MAX, (parseInt(qtyInput.value) || MIN) + 1);
});
qtyInput.addEventListener('input', () => {
  const v = parseInt(qtyInput.value);
  if (!isNaN(v)) qtyInput.value = Math.min(MAX, Math.max(MIN, v));
});
document.getElementById('btn-start').addEventListener('click', () => {
  const qty = Math.min(MAX, Math.max(MIN, parseInt(qtyInput.value) || MIN));
  document.getElementById('setup-overlay').classList.remove('show');
  startGame(qty);
});

/* Colors */
const PALETTE = [
  '#185FA5','#993C1D','#0F6E56','#854F0B','#993556',
  '#534AB7','#1D9E75','#D85A30','#BA7517','#D4537E',
  '#378ADD','#639922','#E24B4A','#3B6D11','#0C447C',
  '#4B1528','#26215C','#04342C','#412402','#501313',
];

/* Figures */
const figures = [];
let totalFigures = 0;

function spreadPositions(n) {
  const cx = W / 2, cy = H / 2;
  const minR = Math.min(W, H) * 0.28;
  const maxR = Math.min(W, H) * 0.44;
  const margin = 65;
  return Array.from({ length: n }, (_, i) => {
    const angle = (2 * Math.PI / n) * i + (Math.random() - 0.5) * 0.7;
    const r = minR + Math.random() * (maxR - minR);
    return {
      x: Math.max(margin, Math.min(W - margin, cx + Math.cos(angle) * r)),
      y: Math.max(margin, Math.min(H - margin, cy + Math.sin(angle) * r)),
    };
  });
}

function startGame(qty) {
  totalFigures = qty;
  figures.length = 0;
  spreadPositions(qty).forEach((p, i) => {
    figures.push({ x: p.x, y: p.y, color: PALETTE[i % PALETTE.length], inCircle: false, imgIdx: Math.floor(Math.random() * 5) });
  });
}

/* Drawing */
const CIRCLE_R = 52;
function getCenter() { return { x: W / 2, y: H / 2 }; }

function drawFigure(x, y, color, scale, alpha, imgIdx) {
  const img = STICK_IMGS[imgIdx % STICK_IMGS.length];
  if (!img.complete || img.naturalWidth === 0) return;
  const baseH = 90 * scale;
  const aspect = img.naturalWidth / img.naturalHeight;
  const drawH = baseH;
  const drawW = baseH * aspect;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.drawImage(img, x - drawW/2, y - drawH/2, drawW, drawH);
  ctx.restore();
}

function drawScene() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#f0f4f8';
  ctx.fillRect(0, 0, W, H);
  if (!figures.length) return;

  const C = getCenter();
  const allIn = figures.every(f => f.inCircle);
  const pulseR = CIRCLE_R + (allIn ? 0 : Math.sin(Date.now() / 600) * 4);

  ctx.beginPath(); ctx.arc(C.x, C.y, pulseR, 0, Math.PI * 2);
  ctx.fillStyle = allIn ? 'rgba(59,109,17,0.12)' : 'rgba(24,95,165,0.10)';
  ctx.fill();
  ctx.strokeStyle = allIn ? '#3B6D11' : '#185FA5';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  figures.forEach(f => { if (!f.inCircle) drawFigure(f.x, f.y, f.color, 1, 1, f.imgIdx); });

  const inside = figures.filter(f => f.inCircle);
  inside.forEach((f, i) => {
    const angle = inside.length > 1 ? (2 * Math.PI / inside.length) * i : 0;
    const r = Math.min(18, 6 + inside.length * 2);
    drawFigure(C.x + Math.cos(angle) * r, C.y + Math.sin(angle) * r, f.color, 0.48, 0.9, f.imgIdx);
  });

  const remaining = figures.filter(f => !f.inCircle).length;
  if (remaining > 0) {
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = remaining < totalFigures ? '#185FA5' : '#555';
    ctx.fillText(
      remaining < totalFigures
        ? `Arraste todos os bonecos para o círculo! (${remaining} restando)`
        : 'Arraste os bonecos para o círculo no centro!',
      W / 2, H - 24
    );
  }

  if (dragging) drawFigure(dragging.x, dragging.y, dragging.color, 1.1, 0.8, dragging.imgIdx);
}

/* Drag */
let dragging = null, dragOffX = 0, dragOffY = 0;
function getPos(e) {
  return e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY };
}
canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('touchstart', onDown, { passive: true });
function onDown(e) {
  const { x, y } = getPos(e);
  for (let i = figures.length - 1; i >= 0; i--) {
    const f = figures[i];
    if (f.inCircle) continue;
    if (Math.hypot(x - f.x, y - f.y) < 44) { dragging = f; dragOffX = f.x - x; dragOffY = f.y - y; break; }
  }
}
window.addEventListener('mousemove', onMove);
window.addEventListener('touchmove', onMove, { passive: true });
function onMove(e) {
  if (!dragging) return;
  const { x, y } = getPos(e);
  dragging.x = x + dragOffX; dragging.y = y + dragOffY;
}
window.addEventListener('mouseup', onUp);
window.addEventListener('touchend', onUp);
function onUp() {
  if (!dragging) return;
  const C = getCenter();
  if (Math.hypot(dragging.x - C.x, dragging.y - C.y) < CIRCLE_R + 22) {
    dragging.inCircle = true;
    if (figures.every(f => f.inCircle))
      setTimeout(() => document.getElementById('result-overlay').classList.add('show'), 300);
  }
  dragging = null;
}

function closeResult() { document.getElementById('result-overlay').classList.remove('show'); }

function restart() {
  document.getElementById('result-overlay').classList.remove('show');
  figures.length = 0;
  totalFigures = 0;
  document.getElementById('qty-input').value = 5;
  document.getElementById('setup-overlay').classList.add('show');
}

(function loop() { drawScene(); requestAnimationFrame(loop); })();
</script>
